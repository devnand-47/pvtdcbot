version: '3.8'

services:
  bot:
    build: .
    container_name: ultimatebot_core
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["python", "bot.py"]

  dashboard:
    build: .
    container_name: ultimatebot_dashboard
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "dashboard:app", "--host", "0.0.0.0", "--port", "8000"]
